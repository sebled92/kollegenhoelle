<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kollegenhölle 🔥</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#0A0A0B;
--surface:#141416;
--surface2:#1C1C1F;
--border:#252529;
--border2:#32323A;
--text:#EDEBE4;
--muted:#7A7A84;
--muted2:#55555C;
--normal:#FFE500;
--roast:#FF3B30;
--roast-dim:#2A0E0C;
--font-disp:'Bebas Neue',sans-serif;
--font-mono:'IBM Plex Mono',monospace;
--font-body:'IBM Plex Sans',sans-serif;
}

html,body{height:100%;overflow:hidden}

body{
font-family:var(--font-body);
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
}

body::before{
content:'';
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
0deg,
transparent,
transparent 3px,
rgba(0,0,0,.05) 3px,
rgba(0,0,0,.05) 4px
);
}

header{
flex-shrink:0;
padding:.85rem 1.5rem .75rem;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
justify-content:space-between;
background:var(--bg);
}

.header-left{
display:flex;
align-items:baseline;
gap:1rem;
}

h1{
font-family:var(--font-disp);
font-size:clamp(2rem,4vw,3rem);
letter-spacing:.05em;
text-transform:uppercase;
}

h1 span{
color:var(--normal);
animation:flicker 5s infinite;
}

.header-sub{
font-family:var(--font-mono);
font-size:10px;
color:var(--muted2);
letter-spacing:.1em;
text-transform:uppercase;
}

.kevin-status{
font-family:var(--font-mono);
font-size:11px;
color:var(--muted);
display:flex;
align-items:center;
gap:6px;
padding:5px 10px;
border:1px solid var(--border);
border-radius:4px;
}

.status-dot{
width:7px;
height:7px;
border-radius:50%;
background:#4CAF50;
animation:pulse-dot 2.5s infinite;
}

@keyframes pulse-dot{
0%,100%{opacity:1}
50%{opacity:.3}
}

@keyframes flicker{
0%,94%,100%{opacity:1}
95%{opacity:.3}
97%{opacity:1}
98%{opacity:.1}
}

.roast-banner{
display:none;
padding:5px;
background:var(--roast);
font-family:var(--font-mono);
font-size:10px;
text-align:center;
letter-spacing:.1em;
}

.roast-banner.visible{
display:block;
}

.mode-bar{
padding:.6rem 1.5rem;
border-bottom:1px solid var(--border);
background:var(--surface);
display:flex;
align-items:center;
gap:10px;
}

.mode-label{
font-family:var(--font-mono);
font-size:10px;
letter-spacing:.1em;
color:var(--muted2);
}

.mode-toggle{
display:flex;
border:1px solid var(--border2);
border-radius:6px;
overflow:hidden;
}

.mode-btn{
font-family:var(--font-mono);
font-size:11px;
padding:6px 14px;
border:none;
cursor:pointer;
background:transparent;
color:var(--muted);
}

.mode-btn.active-normal{
background:var(--normal);
color:#000;
}

.mode-btn.active-roast{
background:var(--roast);
color:#fff;
}

.chat-scroll{
flex:1;
overflow-y:auto;
padding:1.2rem 1.5rem;
}

.chat-inner{
max-width:760px;
margin:0 auto;
display:flex;
flex-direction:column;
gap:1rem;
}

.message{
display:flex;
flex-direction:column;
gap:4px;
}

.message.user{
align-items:flex-end;
}

.message.kevin{
align-items:flex-start;
}

.msg-label{
font-family:var(--font-mono);
font-size:9px;
letter-spacing:.12em;
color:var(--muted2);
}

.msg-bubble{
max-width:68%;
padding:10px 14px;
border-radius:10px;
font-size:14px;
line-height:1.6;
}

.message.user .msg-bubble{
background:#2a2a2f;
border:1px solid var(--border2);
border-bottom-right-radius:3px;
}

.message.kevin .msg-bubble{
background:var(--surface);
border:1px solid var(--border);
border-bottom-left-radius:3px;
}

.kevin-avatar{
width:24px;
height:24px;
border-radius:50%;
background:var(--normal);
color:#000;
font-family:var(--font-mono);
font-size:10px;
display:flex;
align-items:center;
justify-content:center;
}

.kevin-avatar.roast{
background:var(--roast);
color:#fff;
}

.typing-bubble{
display:flex;
gap:5px;
padding:10px;
background:var(--surface);
border:1px solid var(--border);
border-radius:10px;
}

.typing-dot{
width:6px;
height:6px;
background:var(--muted2);
border-radius:50%;
animation:bounce .9s infinite;
}

.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);opacity:.3}
40%{transform:translateY(-5px);opacity:1}
}

.input-bar{
background:var(--surface);
border-top:1px solid var(--border);
padding:.7rem 1.5rem;
}

.input-inner{
max-width:760px;
margin:0 auto;
display:flex;
gap:8px;
}

.chat-input{
flex:1;
background:var(--bg);
border:1px solid var(--border2);
border-radius:8px;
color:var(--text);
padding:10px 14px;
resize:none;
min-height:44px;
max-height:120px;
outline:none;
}

.chat-input:focus{
border-color:var(--normal);
}

.chat-input.roast-mode:focus{
border-color:var(--roast);
}

.send-btn{
font-family:var(--font-mono);
font-size:12px;
padding:0 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:var(--normal);
height:44px;
}

.send-btn.roast{
background:var(--roast);
color:#fff;
}

.footer-bar{
padding:.4rem 1.5rem;
border-top:1px solid var(--border);
font-family:var(--font-mono);
font-size:9px;
display:flex;
justify-content:space-between;
color:var(--muted2);
}

</style>
</head>

<body>

<header>
<div class="header-left">
<h1>Kollegen<span>hölle</span></h1>
<span class="header-sub">powered by Sebastian™</span>
</div>

<div class="kevin-status">
<span class="status-dot"></span>
<span>Kevin ist leider anwesend</span>
</div>
</header>

<div class="roast-banner" id="roastBanner">
⚠ ROAST MODUS AKTIV — KEVIN HAT KEINE HEMMUNGEN MEHR ⚠
</div>

<div class="mode-bar">
<span class="mode-label">Modus:</span>
<div class="mode-toggle">
<button class="mode-btn active-normal" id="btnNormal" onclick="setMode('normal')">😒 Normal</button>
<button class="mode-btn" id="btnRoast" onclick="setMode('roast')">🔥 Roast</button>
</div>
</div>

<div class="chat-scroll" id="chatScroll">
<div class="chat-inner" id="chatInner"></div>
</div>

<div class="input-bar">
<div class="input-inner">

<textarea
class="chat-input"
id="chatInput"
placeholder="Schreib Kevin etwas..."
rows="1"
onkeydown="handleKey(event)"
oninput="autoResize(this)"
></textarea>

<button class="send-btn" id="sendBtn" onclick="sendMessage()">Senden →</button>

</div>
</div>

<div class="footer-bar">
<span>Kollegenhölle v1.0</span>
<span>Kevin™ GmbH</span>
</div>

<script>

let currentMode='normal'
let isLoading=false
let history=[]

const chatInner=document.getElementById('chatInner')

function setMode(mode){

currentMode=mode

document.getElementById('btnNormal').className='mode-btn'+(mode==='normal'?' active-normal':'')
document.getElementById('btnRoast').className='mode-btn'+(mode==='roast'?' active-roast':'')

document.getElementById('sendBtn').className='send-btn'+(mode==='roast'?' roast':'')
document.getElementById('chatInput').className='chat-input'+(mode==='roast'?' roast-mode':'')

document.getElementById('roastBanner').className='roast-banner'+(mode==='roast'?' visible':'')

}

function autoResize(el){
el.style.height='auto'
el.style.height=Math.min(el.scrollHeight,120)+'px'
}

function handleKey(e){
if(e.key==='Enter'&&!e.shiftKey){
e.preventDefault()
sendMessage()
}
}

function scrollToBottom(){
requestAnimationFrame(()=>{
const s=document.getElementById('chatScroll')
s.scrollTop=s.scrollHeight
})
}

function escHtml(s){

if(!s)return''

return String(s)
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/\n/g,'<br>')

}

function appendMessage(role,text,mode){

const div=document.createElement('div')

div.className='message '+role

if(role==='user'){

div.innerHTML=
`<span class="msg-label">Du</span>
<div class="msg-bubble">${escHtml(text)}</div>`

}

else{

div.innerHTML=
`<div style="display:flex;align-items:center;gap:7px">
<div class="kevin-avatar ${mode==='roast'?'roast':''}">K</div>
<span class="msg-label">Kevin</span>
</div>
<div class="msg-bubble">${escHtml(text)}</div>`

}

chatInner.appendChild(div)

scrollToBottom()

}

async function sendMessage(){

const input=document.getElementById('chatInput')
const sendBtn=document.getElementById('sendBtn')

const msg=input.value.trim()

if(!msg||isLoading)return

isLoading=true

sendBtn.disabled=true

input.value=''
input.style.height='auto'

appendMessage('user',msg,currentMode)

history.push({role:'user',content:msg})

try{

const res=await fetch('/api/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
message:msg,
history:history.slice(-6),
mode:currentMode
})
})

const data=await res.json()

if(data.error){

appendMessage('kevin','Kevin starrt kurz auf den Server.\n"'+data.error+'"\nNatürlich funktioniert heute wieder nichts.',currentMode)

}

else{

const reply=data.reply||'*Kevin hat nur kurz aus dem Fenster geschaut.*'

appendMessage('kevin',reply,currentMode)

history.push({role:'assistant',content:reply})

}

}catch(err){

appendMessage('kevin','Kevin seufzt.\nDie API ist wieder kaputt.\nNatürlich.',currentMode)

}

isLoading=false
sendBtn.disabled=false
input.focus()

}

</script>

</body>
</html>
