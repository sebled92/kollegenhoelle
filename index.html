<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kollegenhölle 🔥</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#0A0A0B;
--surface:#141416;
--surface2:#1C1C1F;
--border:#252529;
--border2:#32323A;
--text:#EDEBE4;
--muted:#7A7A84;
--muted2:#55555C;
--normal:#FFE500;
--roast:#FF3B30;
--font-disp:'Bebas Neue',sans-serif;
--font-mono:'IBM Plex Mono',monospace;
--font-body:'IBM Plex Sans',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
font-family:var(--font-body);
height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:.9rem 1.5rem;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-family:var(--font-disp);
font-size:2.2rem;
letter-spacing:.05em;
}

h1 span{color:var(--normal)}

.kevin-status{
font-family:var(--font-mono);
font-size:11px;
color:var(--muted);
}

#liveCounter{
font-family:var(--font-mono);
font-size:10px;
padding:6px 16px;
border-bottom:1px solid var(--border);
color:var(--muted2);
}

.chat-scroll{
flex:1;
overflow-y:auto;
padding:20px;
}

.chat-inner{
max-width:760px;
margin:auto;
display:flex;
flex-direction:column;
gap:16px;
}

.message{
display:flex;
flex-direction:column;
gap:4px;
}

.message.user{align-items:flex-end}
.message.kevin{align-items:flex-start}

.msg-label{
font-family:var(--font-mono);
font-size:9px;
color:var(--muted2);
}

.msg-bubble{
padding:12px 14px;
border-radius:10px;
max-width:70%;
font-size:15px;
line-height:1.6;
}

.message.user .msg-bubble{
background:var(--surface2);
border:1px solid var(--border2);
}

.message.kevin .msg-bubble{
background:var(--surface);
border:1px solid var(--border);
}

.input-bar{
border-top:1px solid var(--border);
padding:14px;
background:var(--surface);
}

.input-inner{
display:flex;
gap:10px;
max-width:760px;
margin:auto;
}

.chat-input{
flex:1;
background:var(--bg);
border:1px solid var(--border2);
color:var(--text);
border-radius:8px;
padding:12px;
font-size:14px;
}

.send-btn{
background:var(--normal);
border:none;
padding:0 22px;
border-radius:8px;
font-family:var(--font-mono);
cursor:pointer;
}

.share-btn{
margin-top:6px;
font-size:9px;
background:none;
border:1px solid var(--border2);
color:var(--muted2);
border-radius:20px;
padding:3px 10px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>Kollegen<span>hölle</span></h1>
<div class="kevin-status">Kevin ist leider anwesend</div>
</header>

<div id="liveCounter">
23 Kollegen beschweren sich gerade über ihre Arbeit
</div>

<div class="chat-scroll" id="chatScroll">
<div class="chat-inner" id="chatInner"></div>
</div>

<div class="input-bar">
<div class="input-inner">
<textarea id="chatInput" class="chat-input" placeholder="Schreib Kevin etwas..."></textarea>
<button class="send-btn" onclick="sendMessage()">Senden</button>
</div>
</div>

<script>

const API_URL="/api/chat"

let history=[]
let isLoading=false
let lastUserMsg=""

let complaintCount=localStorage.getItem("complaints")||0

let colleagues=JSON.parse(localStorage.getItem("colleagueStats")||"{}")

const chatInner=document.getElementById("chatInner")

function escHtml(t){
return String(t)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
}

function addMessage(role,text){

const div=document.createElement("div")
div.className="message "+role

if(role==="user"){

lastUserMsg=text

div.innerHTML=`
<span class="msg-label">Du</span>
<div class="msg-bubble">${escHtml(text)}</div>
`

}else{

div.innerHTML=`
<span class="msg-label">Kevin</span>
<div class="msg-bubble">${escHtml(text)}</div>
<button class="share-btn" onclick="shareMessage('${text.replace(/'/g,"")}')">↗ Teilen</button>
`
}

chatInner.appendChild(div)

scrollBottom()
}

function scrollBottom(){
const s=document.getElementById("chatScroll")
s.scrollTop=s.scrollHeight
}

function shareMessage(reply){

const text=`Ich zu Kevin:

"${lastUserMsg}"

Kevin:

"${reply}"

😑 https://kollegenhoelle.vercel.app`

navigator.clipboard.writeText(text)

}

function extractColleague(text){

const names=["rené","rene","chef","thomas","sabine","it","hr"]

for(let n of names){

if(text.toLowerCase().includes(n)){
colleagues[n]=(colleagues[n]||0)+1
localStorage.setItem("colleagueStats",JSON.stringify(colleagues))
}

}

}

function updateCounter(){

let base=18+Math.floor(Math.random()*15)

setInterval(()=>{

base+=Math.floor(Math.random()*5)-2

if(base<12)base=12
if(base>45)base=45

document.getElementById("liveCounter").innerText=
base+" Kollegen beschweren sich gerade über ihre Arbeit • "+
complaintCount+" Beschwerden heute"

},4000)

}

updateCounter()

async function sendMessage(){

if(isLoading)return

const input=document.getElementById("chatInput")

const msg=input.value.trim()

if(!msg)return

input.value=""

addMessage("user",msg)

history.push({role:"user",content:msg})

extractColleague(msg)

complaintCount++
localStorage.setItem("complaints",complaintCount)

isLoading=true

try{

const res=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:msg,
history:history.slice(-6),
mode:"normal"
})
})

const data=await res.json()

const reply=data.reply||"Kevin schaut dich nur müde an."

addMessage("kevin",reply)

history.push({role:"assistant",content:reply})

}catch(e){

addMessage("kevin","Kevin seufzt. Natürlich funktioniert die API wieder nicht.")

}

isLoading=false

}

</script>

<script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
