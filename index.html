<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kollegenhölle 🔥</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#0A0A0B;
--surface:#141416;
--surface2:#1C1C1F;
--border:#252529;
--border2:#32323A;
--text:#EDEBE4;
--muted:#7A7A84;
--muted2:#55555C;
--normal:#FFE500;
--roast:#FF3B30;
--roast-dim:#2A0E0C;
--font-disp:'Bebas Neue',sans-serif;
--font-mono:'IBM Plex Mono',monospace;
--font-body:'IBM Plex Sans',sans-serif;
}

html,body{height:100%;overflow:hidden}

body{
font-family:var(--font-body);
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
}

/* HEADER */

header{
padding:.9rem 1.5rem;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
justify-content:space-between;
background:var(--bg);
}

h1{
font-family:var(--font-disp);
font-size:2.6rem;
letter-spacing:.05em;
text-transform:uppercase;
}

h1 span{
color:var(--normal);
}

.kevin-status{
font-family:var(--font-mono);
font-size:11px;
color:var(--muted);
display:flex;
align-items:center;
gap:6px;
}

.status-dot{
width:7px;
height:7px;
border-radius:50%;
background:#4CAF50;
}

/* LIVE COUNTER */

#liveCounter{
font-family:var(--font-mono);
font-size:10px;
padding:6px 12px;
color:var(--muted2);
border-bottom:1px solid var(--border);
}

/* CHAT */

.chat-scroll{
flex:1;
overflow-y:auto;
padding:1.2rem 1.5rem;
}

.chat-inner{
max-width:760px;
margin:0 auto;
display:flex;
flex-direction:column;
gap:1rem;
}

.message{
display:flex;
flex-direction:column;
gap:4px;
}

.message.user{
align-items:flex-end;
}

.message.kevin{
align-items:flex-start;
}

.msg-label{
font-family:var(--font-mono);
font-size:9px;
color:var(--muted2);
}

.msg-bubble{
max-width:68%;
padding:10px 14px;
border-radius:10px;
font-size:14px;
line-height:1.6;
}

.message.user .msg-bubble{
background:#2a2a2f;
border:1px solid var(--border2);
}

.message.kevin .msg-bubble{
background:var(--surface);
border:1px solid var(--border);
}

.kevin-avatar{
width:24px;
height:24px;
border-radius:50%;
background:var(--normal);
color:#000;
font-family:var(--font-mono);
font-size:10px;
display:flex;
align-items:center;
justify-content:center;
}

/* INPUT */

.input-bar{
background:var(--surface);
border-top:1px solid var(--border);
padding:.7rem 1.5rem;
}

.input-inner{
max-width:760px;
margin:0 auto;
display:flex;
gap:8px;
}

.chat-input{
flex:1;
background:var(--bg);
border:1px solid var(--border2);
border-radius:8px;
color:var(--text);
padding:10px 14px;
resize:none;
min-height:44px;
}

.send-btn{
font-family:var(--font-mono);
font-size:12px;
padding:0 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:var(--normal);
height:44px;
}

</style>
</head>

<body>

<header>
<h1>Kollegen<span>hölle</span></h1>
<div class="kevin-status">
<span class="status-dot"></span>
<span>Kevin ist leider anwesend</span>
</div>
</header>

<!-- LIVE COUNTER -->
<div id="liveCounter">
23 Kollegen beschweren sich gerade über ihre Arbeit
</div>

<div class="chat-scroll" id="chatScroll">
<div class="chat-inner" id="chatInner"></div>
</div>

<div class="input-bar">
<div class="input-inner">

<textarea
class="chat-input"
id="chatInput"
placeholder="Schreib Kevin etwas..."
rows="1"
onkeydown="handleKey(event)"
></textarea>

<button class="send-btn" onclick="sendMessage()">Senden →</button>

</div>
</div>

<script>

let history=[]
let isLoading=false

function escHtml(s){
if(!s)return''
return String(s)
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/\n/g,'<br>')
}

function appendMessage(role,text){

const div=document.createElement('div')
div.className='message '+role

if(role==='user'){
div.innerHTML=`<span class="msg-label">Du</span>
<div class="msg-bubble">${escHtml(text)}</div>`
}else{
div.innerHTML=`<span class="msg-label">Kevin</span>
<div class="msg-bubble">${escHtml(text)}</div>`
}

document.getElementById('chatInner').appendChild(div)
scrollToBottom()

}

function scrollToBottom(){
const s=document.getElementById('chatScroll')
s.scrollTop=s.scrollHeight
}

function handleKey(e){
if(e.key==='Enter'&&!e.shiftKey){
e.preventDefault()
sendMessage()
}
}

async function sendMessage(){

const input=document.getElementById('chatInput')
const msg=input.value.trim()

if(!msg||isLoading)return

appendMessage('user',msg)

input.value=''

try{

const res=await fetch('/api/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:msg})
})

const data=await res.json()

appendMessage('kevin',data.reply||'Kevin schaut nur kurz müde.')

}catch{

appendMessage('kevin','Kevin seufzt. Natürlich funktioniert die API wieder nicht.')

}

}

/* FAKE VISITORS */

function startFakeVisitors(){

let base = 18 + Math.floor(Math.random()*15)

setInterval(()=>{

let change = Math.floor(Math.random()*5) - 2

base += change

if(base < 12) base = 12
if(base > 45) base = 45

document.getElementById("liveCounter").innerText =
base + " Kollegen beschweren sich gerade über ihre Arbeit"

},4000)

}

startFakeVisitors()

</script>

</body>
</html>
