<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kollegenhölle 🔥</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0A0A0B;
--surface:#141416;
--surface2:#1C1C1F;
--border:#252529;
--border2:#32323A;
--text:#EDEBE4;
--muted:#7A7A84;
--muted2:#55555C;
--normal:#FFE500;
--roast:#FF3B30;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:'IBM Plex Sans';
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
justify-content:space-between;
padding:16px;
border-bottom:1px solid var(--border);
}

h1{
font-family:'Bebas Neue';
letter-spacing:.05em;
font-size:34px;
}

h1 span{color:var(--normal)}

.status{
font-family:'IBM Plex Mono';
font-size:11px;
color:var(--muted);
}

.mode-bar{
padding:10px 16px;
border-bottom:1px solid var(--border);
display:flex;
gap:10px;
}

.mode-btn{
font-family:'IBM Plex Mono';
font-size:11px;
padding:6px 16px;
border-radius:6px;
border:1px solid var(--border2);
background:none;
color:var(--muted);
cursor:pointer;
}

.mode-btn.active{
background:var(--normal);
color:#000;
}

.mode-btn.roast.active{
background:var(--roast);
color:#fff;
}

#liveCounter{
font-family:'IBM Plex Mono';
font-size:10px;
padding:6px 16px;
border-bottom:1px solid var(--border);
color:var(--muted2);
}

.feed{
font-family:'IBM Plex Mono';
font-size:11px;
padding:6px 16px;
border-bottom:1px solid var(--border);
color:var(--muted);
}

.chat{
flex:1;
overflow:auto;
padding:20px;
}

.messages{
max-width:760px;
margin:auto;
display:flex;
flex-direction:column;
gap:16px;
}

.msg{
max-width:70%;
padding:12px 14px;
border-radius:10px;
font-size:14px;
}

.user{
align-self:flex-end;
background:var(--surface2);
border:1px solid var(--border2);
}

.kevin{
background:var(--surface);
border:1px solid var(--border);
}

.input-bar{
border-top:1px solid var(--border);
padding:14px;
background:var(--surface);
}

.input-inner{
display:flex;
gap:10px;
max-width:760px;
margin:auto;
}

textarea{
flex:1;
background:var(--bg);
border:1px solid var(--border2);
color:var(--text);
border-radius:8px;
padding:10px;
font-size:14px;
}

button.send{
background:var(--normal);
border:none;
padding:0 20px;
border-radius:8px;
font-family:'IBM Plex Mono';
cursor:pointer;
}

.donate{
position:fixed;
right:20px;
bottom:20px;
border:1px solid #F5A623;
color:#F5A623;
background:none;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
font-family:'IBM Plex Mono';
}

.donate:hover{
background:#F5A623;
color:#000;
}

</style>
</head>

<body>

<header>
<h1>KOLLEGEN<span>HÖLLE</span></h1>
<div class="status">● Kevin ist leider anwesend</div>
</header>

<div class="mode-bar">
<button class="mode-btn active" id="normalBtn">😒 NORMAL</button>
<button class="mode-btn roast" id="roastBtn">🔥 ROAST</button>
</div>

<div id="liveCounter">23 Kollegen beschweren sich gerade über ihre Arbeit</div>

<div class="feed" id="feed">
Feed lädt...
</div>

<div class="chat">
<div class="messages" id="messages"></div>
</div>

<div class="input-bar">
<div class="input-inner">
<textarea id="input" placeholder="Schreib Kevin etwas..."></textarea>
<button class="send" onclick="send()">Senden →</button>
</div>
</div>

<button class="donate" onclick="donate()">☕ Spende</button>

<script>

const API="/api/chat"
const FEED="/api/feed"

let mode="normal"
let history=[]
let complaints=localStorage.getItem("complaints")||0

document.getElementById("normalBtn").onclick=()=>{
mode="normal"
toggle()
}

document.getElementById("roastBtn").onclick=()=>{
mode="roast"
toggle()
}

function toggle(){
document.getElementById("normalBtn").classList.toggle("active",mode==="normal")
document.getElementById("roastBtn").classList.toggle("active",mode==="roast")
}

function add(role,text){

const div=document.createElement("div")
div.className="msg "+role
div.innerText=text

document.getElementById("messages").appendChild(div)

window.scrollTo(0,document.body.scrollHeight)

}

async function send(){

const input=document.getElementById("input")

const msg=input.value.trim()

if(!msg)return

input.value=""

add("user",msg)

complaints++
localStorage.setItem("complaints",complaints)

try{

const r=await fetch(API,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
message:msg,
history:history.slice(-6),
mode
})
})

const d=await r.json()

add("kevin",d.reply||"Kevin schaut dich müde an.")

history.push({role:"user",content:msg})
history.push({role:"assistant",content:d.reply})

}catch{

add("kevin","Kevin seufzt. Natürlich funktioniert die API nicht.")

}

}

function donate(){

window.open("https://paypal.me/sebastianledwinka","_blank")

}

function fakeVisitors(){

let base=20

setInterval(()=>{

base+=Math.floor(Math.random()*5)-2

if(base<10)base=10
if(base>50)base=50

document.getElementById("liveCounter").innerText=
base+" Kollegen beschweren sich gerade über ihre Arbeit • "+complaints+" Beschwerden heute"

},4000)

}

fakeVisitors()

async function loadFeed(){

try{

const r=await fetch(FEED)

const data=await r.json()

document.getElementById("feed").innerText=data.slice(0,3).join(" • ")

}catch{

document.getElementById("feed").innerText=
"Tom: Chef klaut Ideen • Lisa: IT antwortet nicht • Marc: Meeting hätte eine Mail sein können"

}

}

setInterval(loadFeed,6000)
loadFeed()

</script>

<script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
